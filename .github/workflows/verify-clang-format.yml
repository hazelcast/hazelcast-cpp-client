name: Verify clang-format-22 Installation

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install clang-format-22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22
          sudo ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format

      - name: Verify version
        run: |
          clang-format --version
          which clang-format
          ls -la /usr/bin/clang-format

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run git-clang-format smoke test
        run: |
          echo "git-clang-format is at: $(which git-clang-format)"
          echo "Testing format check on last commit..."
          git-clang-format HEAD~1 -- hazelcast
          echo "Exit code: $?"
          git --no-pager diff
